name: Nightly Tests — Frontend

on:
  schedule:
    - cron: '15 2 * * *'  # 02:15 UTC daily
  workflow_dispatch:

jobs:
  test:
    name: Jest + Playwright + Lighthouse against staging
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Run Jest
        env:
          CI: true
        run: npm run test:ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start Next.js server
        env:
          PORT: 3000
        run: npm run start &

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Run Playwright E2E
        env:
          E2E_BASE_URL: http://localhost:3000
          PLAYWRIGHT_WORKERS: '2'
          CI: true
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-nightly
          path: playwright-report/
          retention-days: 7

      - name: Run Lighthouse smoke
        env:
          NEXT_PUBLIC_USE_MOCK: 'true'
          NEXT_PUBLIC_API_BASE: http://localhost:3000
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
        run: node performance-testing/scripts/lighthouse-batch.mjs --smoke --mobile-only

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-nightly-${{ github.run_id }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 7

      - name: Notify Slack — success
        if: success()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            --data '{
              "text": "✅ *Nightly tests passed* — branch `dev`\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
            }'

      - name: Notify Slack — failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            --data '{
              "text": "❌ *Nightly tests failed* — branch `dev`\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
            }'

  open-issue-on-failure:
    name: Open GitHub issue on failure
    needs: test
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create failure issue
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          DATE=$(date -u '+%Y-%m-%d')
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh issue create \
            --title "Nightly frontend tests failed — ${DATE}" \
            --body "## Nightly frontend test failure

          **Date:** ${DATE}
          **Run:** [View logs](${RUN_URL})

          One or more of Jest / Playwright tests failed." \
            --label "bug,ci-failure" \
            --repo ${{ github.repository }}
