name: PR Gate

on:
  pull_request:
    branches: [main]

jobs:
  test-frontend:
    name: Frontend — Jest + Playwright
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Run Jest
        env:
          CI: true
        run: npm run test:ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start Next.js server
        env:
          PORT: 3000
        run: npm run start &

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Run Playwright E2E
        env:
          E2E_BASE_URL: http://localhost:3000
          PLAYWRIGHT_WORKERS: '2'
          CI: true
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pr-${{ github.event.pull_request.number }}
          path: playwright-report/
          retention-days: 7

      - name: Notify Slack — success
        if: success()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            --data '{
              "text": "✅ *PR gate passed* — PR #${{ github.event.pull_request.number }} `${{ github.head_ref }}` → `main`\n<${{ github.event.pull_request.html_url }}|View PR> · <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
            }'

      - name: Notify Slack — failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            --data '{
              "text": "❌ *PR gate failed* — PR #${{ github.event.pull_request.number }} `${{ github.head_ref }}` → `main`\n<${{ github.event.pull_request.html_url }}|View PR> · <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
            }'
