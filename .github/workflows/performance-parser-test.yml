# Fast regression: Lighthouse batch CLI/env parsing (~60 ms). No npm install — no Lighthouse.
name: Perf parser tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: perf-parser-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-perf-parse:
    name: Lighthouse batch parser (node:test)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Parse tests (performance-testing/scripts)
        run: node --test performance-testing/scripts/parseLighthouseBatchOptions.test.mjs
